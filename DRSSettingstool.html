<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXVK NVAPI DRS Configurator</title>
<style>
:root {
  --bg:#0d0f12; --surface:#141720; --surface2:#1a1f2e;
  --border:#1e2535; --accent:#76b900; --accent-dim:#4a7300;
  --text:#c8cdd8; --text-dim:#5a6070; --text-bright:#e8eaf0;
  --mono:'JetBrains Mono','Fira Mono',monospace;
  --ui:system-ui,-apple-system,sans-serif;
  --red:#e84545; --yellow:#f5a623; --blue:#4a9eff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:13px;line-height:1.5;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;background:var(--bg);z-index:100;flex-wrap:wrap;}
.logo{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.logo span{color:var(--text-dim);}
header h1{font-size:13px;font-weight:600;color:var(--text-bright);}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .1s;white-space:nowrap;}
.btn:hover{border-color:var(--accent-dim);color:var(--text-bright);}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.btn.primary:hover{background:#8fd400;}
.btn.danger{border-color:var(--red);color:var(--red);}
.btn.danger:hover{background:rgba(232,69,69,.1);}
.btn.blue{border-color:var(--blue);color:var(--blue);}
.btn.blue:hover{background:rgba(74,158,255,.1);}
.layout{display:grid;grid-template-columns:250px 1fr;height:calc(100vh - 45px);}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-top{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text-bright);font-family:var(--ui);font-size:12px;padding:5px 9px;border-radius:4px;outline:none;}
.search-wrap input:focus{border-color:var(--accent-dim);}
.search-wrap input::placeholder{color:var(--text-dim);}
.sidebar-nav{display:flex;gap:4px;}
.nav-tab{flex:1;font-size:11px;padding:4px 6px;border-radius:3px;border:1px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;text-align:center;}
.nav-tab.active{background:var(--surface2);color:var(--text-bright);border-color:var(--accent-dim);}
.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 0;}
.cat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);padding:8px 12px 3px;}
.setting-item{padding:5px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .1s;display:flex;align-items:center;gap:7px;}
.setting-item:hover{background:var(--surface);color:var(--text-bright);}
.setting-item.active{border-left-color:var(--accent);background:rgba(118,185,0,.07);color:var(--text-bright);}
.dot{width:5px;height:5px;border-radius:50%;background:transparent;border:1px solid var(--text-dim);flex-shrink:0;}
.setting-item.modified .dot{background:var(--accent);border-color:var(--accent);}
.item-name{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.main{display:flex;flex-direction:column;overflow:hidden;}
.output-bar{border-bottom:1px solid var(--border);padding:8px 16px;background:var(--surface);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.env-label{font-family:var(--mono);font-size:10px;color:var(--accent);white-space:nowrap;}
.env-output{font-family:var(--mono);font-size:11px;color:var(--text-bright);flex:1;min-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg);border:1px solid var(--border);padding:4px 9px;border-radius:3px;cursor:text;user-select:all;}
.env-output.empty{color:var(--text-dim);}
.copy-feedback{font-family:var(--mono);font-size:10px;color:var(--accent);opacity:0;transition:opacity .2s;white-space:nowrap;}
.copy-feedback.show{opacity:1;}
.editor{flex:1;overflow-y:auto;padding:20px;}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text-dim);}
.placeholder .icon{font-size:28px;opacity:.3;}
.placeholder p{font-size:12px;}
.setting-editor{max-width:680px;}
.setting-header{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.setting-header h2{font-size:15px;font-weight:600;color:var(--text-bright);margin-bottom:6px;}
.setting-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.meta-chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);}
.meta-chip .k{color:var(--text-dim);} .meta-chip .v{color:var(--accent);}
.setting-desc{font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.6;}
.control-section{margin-bottom:20px;}
.control-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:8px;}
.enum-grid{display:flex;flex-direction:column;gap:3px;}
.enum-opt{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .1s;}
.enum-opt:hover{border-color:var(--accent-dim);background:rgba(118,185,0,.04);}
.enum-opt.selected{border-color:var(--accent);background:rgba(118,185,0,.08);}
.enum-opt-body{flex:1;}
.enum-opt-name{font-size:12px;color:var(--text-bright);font-weight:500;}
.enum-opt-desc{font-size:11px;color:var(--text-dim);margin-top:2px;}
.enum-opt-val{font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:2px;}
.radio-circle{width:13px;height:13px;border-radius:50%;border:2px solid var(--text-dim);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:border-color .1s;}
.enum-opt.selected .radio-circle{border-color:var(--accent);}
.radio-inner{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .1s;}
.enum-opt.selected .radio-inner{opacity:1;}
.num-row,.hex-row,.dec-hex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.num-input,.hex-input,.dec-input{background:var(--surface);border:1px solid var(--border);color:var(--text-bright);font-family:var(--mono);font-size:13px;padding:6px 10px;border-radius:4px;outline:none;}
.num-input{width:150px;} .hex-input{width:150px;color:var(--accent);} .dec-input{width:120px;}
.num-input:focus,.hex-input:focus,.dec-input:focus{border-color:var(--accent-dim);}
.num-range,.hex-prefix,.dec-prefix{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.clear-btn{font-family:var(--mono);font-size:10px;padding:4px 9px;border-radius:3px;border:1px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;}
.clear-btn:hover{border-color:var(--red);color:var(--red);}
.syntax-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--accent);overflow-x:auto;white-space:pre-wrap;word-break:break-word;}
.syntax-label{font-size:10px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.hex-preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-top:8px;}
.hex-preset-btn{font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:3px;border:1px solid var(--border);background:var(--surface);color:var(--accent);cursor:pointer;transition:all .1s;}
.hex-preset-btn:hover{border-color:var(--accent-dim);background:rgba(118,185,0,.1);}
/* profile panel */
.profile-panel{padding:16px;}
.profile-panel h3{font-size:13px;font-weight:600;color:var(--text-bright);margin-bottom:12px;}
.profile-create{display:flex;gap:6px;margin-bottom:16px;}
.profile-create input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text-bright);font-family:var(--ui);font-size:12px;padding:6px 10px;border-radius:4px;outline:none;}
.profile-create input:focus{border-color:var(--accent-dim);}
.profile-list{display:flex;flex-direction:column;gap:4px;}
.profile-item{padding:8px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .1s;}
.profile-item:hover{border-color:var(--accent-dim);}
.profile-item.active-profile{border-color:var(--accent);}
.profile-name{flex:1;font-size:13px;color:var(--text-bright);font-weight:500;}
.profile-count{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.profile-actions{display:flex;gap:4px;}
.profile-btn{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:3px;border:1px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;}
.profile-btn:hover{border-color:var(--accent-dim);color:var(--text-bright);}
.profile-btn.del:hover{border-color:var(--red);color:var(--red);}
.profile-empty{font-size:12px;color:var(--text-dim);padding:16px 0;}
/* arch panel */
.arch-section{margin-bottom:16px;}
.arch-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:8px;}
.arch-grid{display:flex;flex-direction:column;gap:3px;}
.arch-opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .1s;}
.arch-opt:hover{border-color:var(--accent-dim);background:rgba(118,185,0,.04);}
.arch-opt.selected{border-color:var(--accent);background:rgba(118,185,0,.08);}
.arch-opt-info{flex:1;}
.arch-name{font-size:13px;color:var(--text-bright);font-weight:500;}
.arch-sub{font-size:11px;color:var(--text-dim);margin-top:1px;}
.arch-code{font-family:var(--mono);font-size:11px;color:var(--accent);}
.arch-output-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
.arch-output-label{font-family:var(--mono);font-size:10px;color:var(--accent);}
.arch-output-val{font-family:var(--mono);font-size:11px;color:var(--text-bright);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim);}
</style>
</head>
<body>

<header>
  <div class="logo">DXVK<span>-NVAPI</span></div>
  <h1>DRS Configurator</h1>
  <div class="header-right">
    <button class="btn blue" onclick="saveToCurrentProfile()" id="save-btn" disabled>Save to Profile</button>
    <button class="btn danger" onclick="clearAll()">Clear All</button>
    <button class="btn primary" onclick="copySettingsOnly()">Copy Settings</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap"><input type="text" id="search" placeholder="Filter settings…" oninput="filterSettings(this.value)"></div>
      <div class="sidebar-nav">
        <button class="nav-tab active" onclick="switchTab('settings',this)">Settings</button>
        <button class="nav-tab" onclick="switchTab('arch',this)">GPU Arch</button>
        <button class="nav-tab" onclick="switchTab('profiles',this)">Profiles</button>
      </div>
    </div>
    <div class="sidebar-scroll" id="sidebar-scroll">
      <div id="tab-settings"><div id="sidebar-content"></div></div>
      <div id="tab-arch" style="display:none;padding:10px;"></div>
      <div id="tab-profiles" style="display:none;"></div>
    </div>
  </div>

  <div class="main">
    <div class="output-bar">
      <span class="env-label">DXVK_NVAPI_GPU_ARCH=</span>
      <span id="arch-output" style="font-family:var(--mono);font-size:11px;color:var(--text-dim);">not set</span>
      &nbsp;&nbsp;
      <span class="env-label">DXVK_NVAPI_DRS_SETTINGS=</span>
      <div class="env-output empty" id="env-output">No settings configured</div>
      <span class="copy-feedback" id="copy-feedback">Copied!</span>
      <button class="btn" onclick="copySettings()">Copy</button>
      <button class="btn" onclick="copyFull()">Copy All</button>
    </div>

    <div class="editor" id="editor">
      <div id="setting-panel" style="display:none" class="setting-editor"></div>
      <div class="placeholder" id="placeholder">
        <div class="icon">⚙</div>
        <p>Select a setting from the sidebar to configure it</p>
        <p style="font-size:11px;margin-top:4px;">Use Profiles tab to save/load per-game configurations</p>
      </div>
    </div>
  </div>
</div>

<script>
const GPU_ARCHS = [
  { name:'GeForce 900 Series', arch:'Maxwell', prefix:'GM', code:'GM200', example:'GTX 980 Ti' },
  { name:'GeForce 10 Series', arch:'Pascal', prefix:'GP', code:'GP104', example:'GTX 1080' },
  { name:'GeForce 16 / 20 Series', arch:'Turing', prefix:'TU', code:'TU102', example:'RTX 2080 Ti' },
  { name:'GeForce RTX 30 Series', arch:'Ampere', prefix:'GA', code:'GA102', example:'RTX 3090' },
  { name:'GeForce RTX 40 Series', arch:'Ada Lovelace', prefix:'AD', code:'AD102', example:'RTX 4090' },
  { name:'GeForce RTX 50 Series', arch:'Blackwell', prefix:'GB', code:'GB200', example:'RTX 5090' },
];

const SETTINGS = [
  // ── DLSS / NGX (15 settings) ────────────────────────────────────────────
  { id:'0x10E41E01', name:'DLSS-SR Override Enable', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[
      {name:'Off',val:'0x0'},{name:'On',val:'0x1'},
    ], desc:'Enable DLSS Super Resolution override.' },
  { id:'0x10E41E02', name:'DLSS-RR Override Enable', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[
      {name:'Off',val:'0x0'},{name:'On',val:'0x1'},
    ], desc:'Enable DLSS Ray Reconstruction override.' },
  { id:'0x10E41E03', name:'DLSS-FG Override Enable', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[
      {name:'Off',val:'0x0'},{name:'On',val:'0x1'},
    ], desc:'Enable DLSS Frame Generation override.' },
  { id:'0x10E41DF1', name:'DLSS-FG Render Preset', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[

  { id:'0x10E41DF3', name:'DLSS-SR Render Preset', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[

  { id:'0x10AFB768', name:'DLSS-SR Performance Mode', cat:'DLSS / NGX', type:'enum', default:'0x3', values:[

  { id:'0x10BD9423', name:'DLSS-RR Performance Mode', cat:'DLSS / NGX', type:'enum', default:'0x3', values:[
      {name:'Performance',val:'0x0'},{name:'Balanced',val:'0x1'},{name:'Quality',val:'0x2'},{name:'Snippet Controlled',val:'0x3'},{name:'DLAA',val:'0x4'},{name:'Ultra Performance',val:'0x5'},{name:'Custom',val:'0x6'},
    ], desc:'Override DLSS-RR quality/performance mode.' },
  { id:'0x10E41DF4', name:'DLAA Override', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[
      {name:'Default',val:'0x0'},{name:'Force DLAA',val:'0x1'},

  { id:'0x10E41DF5', name:'DLSS-SR Scaling Ratio', cat:'DLSS / NGX', type:'numeric', min:0, max:100, default:0, desc:'Override scaling ratio for DLSS-SR (33-100%).' },
  { id:'0x10C7D4A2', name:'DLSS-RR Scaling Ratio', cat:'DLSS / NGX', type:'numeric', min:0, max:100, default:0, desc:'Override scaling ratio for DLSS-RR (33-100%).' },

  { id:'0x10AFB76C', name:'DLSS Ultra-Performance Override', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[
      {name:'None',val:'0x0'},{name:'Force Ultra Performance (9x)',val:'0x1'},
    ], desc:'Override DLSS performance mode to ultra-performance.' },
  { id:'0x10444444', name:'NVIDIA Quality Upscaling (NIS)', cat:'DLSS / NGX', type:'enum', default:'0x0', values:[
      {name:'Off',val:'0x0'},{name:'On',val:'0x1'},
    ], desc:'Enable NVIDIA Image Scaling upscaling.' },

  // ── Anti-Aliasing (7 settings) ──────────────────────────────────────────
  { id:'0x10ECDB82', name:'AA Behavior Flags', cat:'Anti-Aliasing', type:'hex', default:'0x0', desc:'Control how AA mode interacts with settings (bitfield).' },

    ], desc:'Enable alpha-to-coverage transparency AA.' },
  { id:'0x107D639D', name:'AA Gamma Correction', cat:'Anti-Aliasing', type:'enum', default:'0x0', values:[
      {name:'Off',val:'0x0'},{name:'On if FOS',val:'0x1'},{name:'On always',val:'0x2'},
    ], desc:'Antialiasing gamma correction mode.' },
  { id:'0x10D773D2', name:'AA Method', cat:'Anti-Aliasing', type:'enum', default:'0x0', values:[
      {name:'None',val:'0x0'},{name:'2x Supersample H',val:'0x1'},{name:'2x Supersample V',val:'0x2'},{name:'4x Supersample',val:'0x5'},{name:'8x Multisample',val:'0x25'},{name:'2x Multisample Diagonal',val:'0xe'},{name:'2x Multisample Quincunx',val:'0xf'},{name:'4x Multisample',val:'0x10'},{name:'16x Multisample',val:'0x1c'},{name:'4x Mixedsample',val:'0x13'},{name:'8x Mixedsample',val:'0x18'},{name:'16x Mixedsample',val:'0x1a'},{name:'32x Mixedsample',val:'0x29'},
    ], desc:'Antialiasing sample method.' },
  { id:'0x10D48A85', name:'AA Transparency Supersampling', cat:'Anti-Aliasing', type:'enum', default:'0x0', values:[

const state = {};
let activeSetting = null;
let currentTab = 'settings';
let selectedArch = null;
let currentProfile = null;
let profiles = JSON.parse(localStorage.getItem('drs_profiles') || '{}');

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['settings','arch','profiles'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none');
  document.getElementById('search').style.display = tab==='settings' ? '' : 'none';
  if (tab==='arch') renderArchTab();
  if (tab==='profiles') renderProfilesTab();
}

function renderArchTab() {
  const el = document.getElementById('tab-arch');
  el.innerHTML = `<div class="arch-section"><h4>GPU Architecture</h4><div class="arch-grid">` +
    GPU_ARCHS.map(a => `<div class="arch-opt ${selectedArch===a?'selected':''}" onclick="selectArch(${GPU_ARCHS.indexOf(a)})">
      <div class="radio-circle"><div class="radio-inner"></div></div>
      <div class="arch-opt-info"><div class="arch-name">${a.name}</div><div class="arch-sub">${a.arch} · ${a.example}</div></div>
      <div class="arch-code">${a.code}</div></div>`).join('') +
    `</div>${selectedArch ? `<div class="arch-output-row"><span class="arch-output-label">DXVK_NVAPI_GPU_ARCH=</span>
      <span class="arch-output-val">${selectedArch.code}</span><button class="btn danger" style="margin-left:auto" onclick="clearArch()">Clear</button></div>`
      : `<div style="margin-top:10px;font-size:11px;color:var(--text-dim)">No architecture selected</div>`}</div>`;
}

function selectArch(idx) {
  selectedArch = GPU_ARCHS[idx];
  document.getElementById('arch-output').textContent = selectedArch.code;
  document.getElementById('arch-output').style.color = 'var(--accent)';
  renderArchTab();
}

function clearArch() {
  selectedArch = null;
  document.getElementById('arch-output').textContent = 'not set';
  document.getElementById('arch-output').style.color = 'var(--text-dim)';
  renderArchTab();
}

function renderProfilesTab() {
  const el = document.getElementById('tab-profiles');
  const names = Object.keys(profiles);
  el.innerHTML = `<div class="profile-panel"><h3>Game Profiles</h3><div class="profile-create">
    <input type="text" id="new-profile-name" placeholder="Game name" onkeydown="if(event.key==='Enter')createProfile()">
    <button class="btn primary" onclick="createProfile()">Save</button></div><div class="profile-list">` +
    (names.length ? names.map(n => {const p = profiles[n]; const count = Object.keys(p.settings||{}).length;
      return `<div class="profile-item ${n===currentProfile?'active-profile':''}"><div>
        <div class="profile-name">${n}</div><div class="profile-count">${count} setting${count!==1?'s':''}</div></div>
        <div class="profile-actions"><button class="profile-btn" onclick="loadProfile('${n.replace(/'/g,"\\'")}')">Load</button>
        <button class="profile-btn del" onclick="deleteProfile('${n.replace(/'/g,"\\'")}')">Delete</button></div></div>`;}).join('')
      : '<div class="profile-empty">No profiles saved</div>') + `</div></div>`;
}

function createProfile() {
  const nameEl = document.getElementById('new-profile-name');
  const name = nameEl.value.trim();
  if (!name) return;
  profiles[name] = { settings: {...state}, arch: selectedArch ? selectedArch.code : null };
  saveProfiles();
  currentProfile = name;
  nameEl.value = '';
  document.getElementById('save-btn').disabled = false;
  renderProfilesTab();
  showFeedback(`Saved: ${name}`);
}

function loadProfile(name) {
  const p = profiles[name];
  if (!p) return;
  for (const k of Object.keys(state)) delete state[k];
  Object.assign(state, p.settings || {});
  if (p.arch) {
    selectedArch = GPU_ARCHS.find(a => a.code === p.arch) || null;
    document.getElementById('arch-output').textContent = p.arch;
    document.getElementById('arch-output').style.color = 'var(--accent)';
  } else {
    selectedArch = null;
    document.getElementById('arch-output').textContent = 'not set';
    document.getElementById('arch-output').style.color = 'var(--text-dim)';
  }
  currentProfile = name;
  document.getElementById('save-btn').disabled = false;
  activeSetting = null;
  document.getElementById('setting-panel').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  buildSidebar(document.getElementById('search').value);
  updateOutput();
  renderProfilesTab();
  showFeedback(`Loaded: ${name}`);
}

function deleteProfile(name) {
  if (!confirm(`Delete profile "${name}"?`)) return;
  delete profiles[name];
  if (currentProfile === name) { currentProfile = null; document.getElementById('save-btn').disabled = true; }
  saveProfiles();
  renderProfilesTab();
}

function saveToCurrentProfile() {
  if (!currentProfile) return;
  profiles[currentProfile] = { settings: {...state}, arch: selectedArch ? selectedArch.code : null };
  saveProfiles();
  renderProfilesTab();
  showFeedback(`Saved to: ${currentProfile}`);
}

function saveProfiles() {
  try { localStorage.setItem('drs_profiles', JSON.stringify(profiles)); } catch(e){}
}

function buildSidebar(filter='') {
  const f = filter.toLowerCase();
  const cats = {};
  for (const s of SETTINGS) {
    if (f && !s.name.toLowerCase().includes(f) && !s.id.toLowerCase().includes(f) && !s.cat.toLowerCase().includes(f)) continue;
    if (!cats[s.cat]) cats[s.cat] = [];
    cats[s.cat].push(s);
  }
  const el = document.getElementById('sidebar-content');
  el.innerHTML = '';
  for (const [cat, settings] of Object.entries(cats)) {
    const label = document.createElement('div');
    label.className='cat-label'; label.textContent=cat; el.appendChild(label);
    for (const s of settings) {
      const item = document.createElement('div');
      item.className = 'setting-item'+(activeSetting===s.id?' active':'')+(state[s.id]!=null?' modified':'');
      item.innerHTML = `<div class="dot"></div><div class="item-name">${s.name}</div>`;
      item.onclick = () => openSetting(s.id);
      el.appendChild(item);
    }
  }
}

function openSetting(id) {
  activeSetting = id;
  const s = SETTINGS.find(x => x.id===id);
  buildSidebar(document.getElementById('search').value);
  document.getElementById('placeholder').style.display = 'none';
  const panel = document.getElementById('setting-panel');
  panel.style.display = 'block';
  const cur = state[id];

  let valHtml = '';
  if (s.type==='enum') {
    valHtml = `<div class="enum-grid">`+s.values.map(v=>{
      const sel = cur===v.val;
      return `<div class="enum-opt ${sel?'selected':''}" onclick="setEnum('${id}','${v.val}',this)">
        <div class="radio-circle"><div class="radio-inner"></div></div>
        <div class="enum-opt-body"><div class="enum-opt-name">${v.name}</div>
        ${v.desc?`<div class="enum-opt-desc">${v.desc}</div>`:''}
        <div class="enum-opt-val">${v.val}</div></div></div>`;
    }).join('')+`</div>`;
  } else if (s.type==='hex-preset') {
    valHtml = `<div class="hex-preset-grid">`+s.presets.map(p=>{
      const sel = cur===p.val;
      return `<button class="hex-preset-btn ${sel?'selected':''}" onclick="setHexPreset('${id}','${p.val}')" style="${sel?'border-color:var(--accent);background:rgba(118,185,0,.1)':''}">${p.name}</button>`;
    }).join('')+`</div>
    <div style="margin-top:12px;">
      <div class="hex-prefix">Or enter hex: 0x</div>
      <input class="hex-input" type="text" value="${cur ? cur.replace(/^0x/i,'').toUpperCase() : ''}" oninput="setHex('${id}',this.value)" placeholder="Enter hex value">
      <button class="clear-btn" onclick="clearSetting('${id}')" style="margin-left:8px;">Reset</button>
    </div>`;
  } else if (s.type==='numeric') {
    const cv = cur!=null ? (parseInt(cur,16)||parseInt(cur)||s.default) : s.default;
    valHtml = `<div class="num-row">
      <input class="num-input" type="number" value="${cv}" min="${s.min}" max="${s.max}" oninput="setNumeric('${id}',this.value)">
      <span class="num-range">${s.min} – ${s.max}</span>
      <button class="clear-btn" onclick="clearSetting('${id}')">Reset</button>
    </div>`;
  } else if (s.type==='dec-hex') {
    const hexVal = cur ? cur.replace(/^0x/i,'') : '';
    const decVal = hexVal ? parseInt(hexVal, 16) : '';
    valHtml = `<div class="dec-hex-row">
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="dec-prefix">Dec:</span>
        <input class="dec-input" type="number" value="${decVal}" oninput="setDecimal('${id}',this.value)" placeholder="Decimal">
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="hex-prefix">Hex: 0x</span>
        <input class="hex-input" type="text" value="${hexVal.toUpperCase()}" oninput="setHex('${id}',this.value)" placeholder="Hex">
      </div>
      <button class="clear-btn" onclick="clearSetting('${id}')">Reset</button>
    </div>`;
  } else {
    const cv = cur!=null ? cur.replace(/^0x/i,'') : '';
    valHtml = `<div class="hex-row">
      <span class="hex-prefix">0x</span>
      <input class="hex-input" type="text" value="${cv.toUpperCase()}" oninput="setHex('${id}',this.value)" placeholder="Hex value">
      <button class="clear-btn" onclick="clearSetting('${id}')">Reset</button>
    </div>`;
  }

  let syntaxHtml = '';
  if (s.syntax) {
    syntaxHtml = `<div class="syntax-box"><div class="syntax-label">Example:</div>${s.syntax}</div>`;
  }

  panel.innerHTML = `<div class="setting-header">
    <h2>${s.name}</h2>
    <div class="setting-meta">
      <span class="meta-chip"><span class="k">ID </span><span class="v">${s.id}</span></span>
      <span class="meta-chip"><span class="k">Category </span><span class="v">${s.cat}</span></span>
      ${cur!=null?`<span class="meta-chip"><span class="k">Value </span><span class="v">${cur}</span></span>`:''}
    </div>
    <div class="setting-desc">${s.desc}</div>
  </div>
  <div class="control-section">
    <div class="control-label">Value</div>
    ${valHtml}
  </div>
  ${syntaxHtml}
  ${cur!=null?`<button class="btn danger" onclick="clearSetting('${id}')">Remove Setting</button>`:''}`;
}

function setEnum(id,val,el) {
  state[id]=val;
  el.closest('.enum-grid').querySelectorAll('.enum-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  afterChange(id);
}

function setHexPreset(id, val) {
  state[id] = val;
  afterChange(id);
  openSetting(id);
}

function setNumeric(id,val) {
  const s=SETTINGS.find(x=>x.id===id);
  const n=parseInt(val);
  if (isNaN(n)) return;
  state[id]='0x'+Math.max(s.min,Math.min(s.max,n)).toString(16).toUpperCase();
  afterChange(id);
}

function setDecimal(id, val) {
  const n = parseInt(val);
  if (isNaN(n)) return;
  const s = SETTINGS.find(x=>x.id===id);
  const clamped = Math.max(s.min||0, Math.min(s.max||999999, n));
  state[id]='0x'+clamped.toString(16).toUpperCase();
  const hexInput = document.querySelector('.hex-input');
  if (hexInput) hexInput.value = clamped.toString(16).toUpperCase();
  afterChange(id);
}

function setHex(id,val) {
  const clean=val.replace(/[^0-9a-fA-F]/g,'');
  if (!clean) return;
  state[id]='0x'+clean.toUpperCase();
  const s = SETTINGS.find(x=>x.id===id);
  if (s.type==='dec-hex') {
    const decInput = document.querySelector('.dec-input');
    if (decInput) decInput.value = parseInt(clean, 16);
  }
  afterChange(id);
}

function clearSetting(id) {
  delete state[id];
  if (activeSetting===id) openSetting(id);
  afterChange(id);
}

function clearAll() {
  for (const k of Object.keys(state)) delete state[k];
  activeSetting=null;
  document.getElementById('placeholder').style.display='flex';
  document.getElementById('setting-panel').style.display='none';
  afterChange(null);
}

function afterChange(id) {
  buildSidebar(document.getElementById('search').value);
  updateOutput();
  if (id && activeSetting===id) {
    const chip = document.querySelector('.setting-meta');
    if (chip) {
      const s=SETTINGS.find(x=>x.id===id); const cur=state[id];
      chip.innerHTML=`<span class="meta-chip"><span class="k">ID </span><span class="v">${s.id}</span></span>
        <span class="meta-chip"><span class="k">Category </span><span class="v">${s.cat}</span></span>
        ${cur!=null?`<span class="meta-chip"><span class="k">Value </span><span class="v">${cur}</span></span>`:''}`;
    }
  }
}

function updateOutput() {
  const pairs=Object.entries(state).filter(([,v])=>v!=null);
  const out=document.getElementById('env-output');
  if (!pairs.length) { out.textContent='No settings configured'; out.className='env-output empty'; return; }
  out.className='env-output';
  out.textContent=pairs.map(([k,v])=>`${k}=${v}`).join(',');
}

function copySettings() {
  const pairs=Object.entries(state).filter(([,v])=>v!=null);
  if (!pairs.length) return;
  const line=pairs.map(([k,v])=>`${k}=${v}`).join(',');
  navigator.clipboard.writeText(line).then(()=>showFeedback('Settings copied!'));
}

function copySettingsOnly() {
  const pairs=Object.entries(state).filter(([,v])=>v!=null);
  if (!pairs.length) return;
  const line=pairs.map(([k,v])=>`${k}=${v}`).join(',');
  navigator.clipboard.writeText(line).then(()=>showFeedback('Settings copied!'));
}

function copyFull() {
  const lines=[];
  if (selectedArch) lines.push('DXVK_NVAPI_GPU_ARCH='+selectedArch.code);
  const pairs=Object.entries(state).filter(([,v])=>v!=null);
  if (pairs.length) lines.push('DXVK_NVAPI_DRS_SETTINGS='+pairs.map(([k,v])=>`${k}=${v}`).join(','));
  if (!lines.length) return;
  navigator.clipboard.writeText(lines.join(' ')).then(()=>showFeedback('All copied!'));
}

function showFeedback(msg) {
  const fb=document.getElementById('copy-feedback');
  fb.textContent=msg; fb.classList.add('show');
  setTimeout(()=>fb.classList.remove('show'),1600);
}

function filterSettings(val) { buildSidebar(val); }

buildSidebar();
</script>
</body>
</html>
